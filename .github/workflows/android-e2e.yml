name: Android E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout framework repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout detox-demo app
        uses: actions/checkout@v4
        with:
          repository: tjmaher/detox-demo
          path: detox-demo

      - name: Cache node_modules framework
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-framework-${{ hashFiles('package-lock.json') }}

      - name: Cache node_modules detox-demo
        uses: actions/cache@v4
        with:
          path: detox-demo/node_modules
          key: ${{ runner.os }}-npm-demo-${{ hashFiles('detox-demo/package-lock.json') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('detox-demo/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install framework dependencies
        run: npm install

      - name: Install detox-demo dependencies
        working-directory: detox-demo
        run: npm install

      - name: Build Android APK
        working-directory: detox-demo
        run: npx detox build --configuration android.emu.debug
        env:
          APK_PATH: ${{ github.workspace }}/detox-demo/android/app/build/outputs/apk/debug/app-debug.apk
          AVD_NAME: Pixel_5_API_31
          DETOX_CONFIGURATION: android.emu.debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Metro bundler
        working-directory: detox-demo
        run: npm start -- --reset-cache &

      - name: Wait for Metro bundler
        run: |
          echo "Waiting for Metro on :8081..."
          timeout 60 bash -c 'until curl -sf http://localhost:8081/status; do sleep 2; done'
          echo "Metro is ready"

      - name: Run Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          avd-name: Pixel_5_API_31
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: npm run test:android
        env:
          APK_PATH: ${{ github.workspace }}/detox-demo/android/app/build/outputs/apk/debug/app-debug.apk
          TEST_APK_PATH: ${{ github.workspace }}/detox-demo/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          AVD_NAME: Pixel_5_API_31
          DETOX_CONFIGURATION: android.emu.debug

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-${{ github.run_number }}
          path: |
            artifacts/
            e2e/reports/
          retention-days: 7
