version: "0.2"

runson: android

autosplit: false

concurrency: 1

globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

env:
  DETOX_CONFIGURATION: android.lt.debug
  DETOX: true
  isRealMobile: true
  mobileDC: true
  platformName: android

pre:
  - npm install

testDiscovery:
  type: raw
  mode: static
  command: echo "test:lt"

testRunnerCommand: npm run $test

uploadArtefacts:
  - name: detox-artifacts
    path:
      - artifacts/
  - name: test-reports
    path:
      - e2e/reports/

framework:
  name: raw
  args:
    buildName: detox-rn-framework
    deviceLogs: true
    video: true
    devices:
      - android:11
    appId: lt://APP10160251981779720719258472
    testAppId: lt://APP10160251981779720719258472

jobLabel: ['detox', 'android', 'react-native']
